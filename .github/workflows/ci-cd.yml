name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test Backend
        working-directory: ./jobportal-backend
        run: mvn clean package

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './jobportal-frontend/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./jobportal-frontend
        run: npm install
          
      - name: Run Frontend Tests
        working-directory: ./jobportal-frontend
        run: CI=true npm test
        
      - name: Build Frontend Application
        working-directory: ./jobportal-frontend
        run: CI=false npm run build

  security-scan-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy FS Scanner (Console Report)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy FS Scanner (JSON Report)
        uses: aquasecurity/trivy-action@v0.20.0
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-repo-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Repository Scan Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-repo-report
          path: trivy-repo-report.json

  build-and-scan-images:
    needs: [build-and-test-backend, build-and-test-frontend, security-scan-repo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image Locally
        run: |
          docker build -t ravindudilhan/jobportal-backend:${{ github.sha }} ./jobportal-backend

      - name: Build Frontend Image Locally
        run: |
          docker build -t ravindudilhan/jobportal-frontend:${{ github.sha }} ./jobportal-frontend

      - name: Scan Backend Image (Policy Gate)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: 'ravindudilhan/jobportal-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'CRITICAL'

      - name: Scan Frontend Image (Policy Gate)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: 'ravindudilhan/jobportal-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'CRITICAL'

      - name: Generate Backend Image JSON Report
        uses: aquasecurity/trivy-action@v0.20.0
        if: always()
        with:
          image-ref: 'ravindudilhan/jobportal-backend:${{ github.sha }}'
          format: 'json'
          output: 'trivy-backend-image-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Generate Frontend Image JSON Report
        uses: aquasecurity/trivy-action@v0.20.0
        if: always()
        with:
          image-ref: 'ravindudilhan/jobportal-frontend:${{ github.sha }}'
          format: 'json'
          output: 'trivy-frontend-image-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Image Scan Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-reports
          path: |
            trivy-backend-image-report.json
            trivy-frontend-image-report.json

  docker-push:
    needs: [build-and-scan-images]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./jobportal-backend
          push: true
          tags: |
            ravindudilhan/jobportal-backend:latest
            ravindudilhan/jobportal-backend:${{ github.sha }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./jobportal-frontend
          push: true
          tags: |
            ravindudilhan/jobportal-frontend:latest
            ravindudilhan/jobportal-frontend:${{ github.sha }}

  deploy-to-k3s:
    needs: [docker-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      KUBECONFIG_FILE: ${{ github.workspace }}/.kubeconfig
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo "KUBECONFIG secret is not set, so deployment will be skipped for testing."
            echo "SKIP_K3S_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if printf '%s' "$KUBECONFIG_CONTENT" | grep -q '^apiVersion:'; then
            printf '%s\n' "$KUBECONFIG_CONTENT" > "${{ env.KUBECONFIG_FILE }}"
          else
            printf '%s' "$KUBECONFIG_CONTENT" | base64 --decode > "${{ env.KUBECONFIG_FILE }}"
          fi

          chmod 600 "${{ env.KUBECONFIG_FILE }}"

          SERVER_URL=$(kubectl --kubeconfig "${{ env.KUBECONFIG_FILE }}" config view --raw --minify -o jsonpath='{.clusters[0].cluster.server}')
          if echo "$SERVER_URL" | grep -Eq 'localhost|127\.0\.0\.1|::1'; then
            echo "::error::KUBECONFIG points to $SERVER_URL. Update the secret to use a reachable cluster endpoint, not localhost."
            exit 1
          fi

          kubectl --kubeconfig "${{ env.KUBECONFIG_FILE }}" config current-context

      - name: Create or Update Kubernetes Secrets
        if: env.SKIP_K3S_DEPLOY != 'true'
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RDSDB_PASSWORD: ${{ secrets.RDSDB_PASSWORD }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          RDSDB_USERNAME: ${{ secrets.RDSDB_USERNAME }}
        run: |
          export KUBECONFIG="${{ env.KUBECONFIG_FILE }}"

          ROOT_PW="$MYSQL_ROOT_PASSWORD"
          if [ -z "$ROOT_PW" ]; then
            ROOT_PW="$DB_PASSWORD"
          fi
          if [ -z "$ROOT_PW" ]; then
            ROOT_PW="$RDSDB_PASSWORD"
          fi

          if [ -z "$ROOT_PW" ]; then
            echo "::error::Set one of MYSQL_ROOT_PASSWORD, DB_PASSWORD, or RDSDB_PASSWORD in GitHub Secrets."
            exit 1
          fi

          MAIL_PW_VALUE="${MAIL_PASSWORD:-placeholder}"
          JWT_SECRET_VALUE="${JWT_SECRET:-supersecretkey}"
          DB_HOST_VALUE="${DB_HOST:-db}"
          DB_USERNAME_VALUE="$DB_USERNAME"
          if [ -z "$DB_USERNAME_VALUE" ]; then
            DB_USERNAME_VALUE="$RDSDB_USERNAME"
          fi
          if [ -z "$DB_USERNAME_VALUE" ]; then
            DB_USERNAME_VALUE="root"
          fi

          kubectl --kubeconfig "$KUBECONFIG" create secret generic jobportal-secrets \
            --from-literal=mysql-root-password="$ROOT_PW" \
            --from-literal=mail-password="$MAIL_PW_VALUE" \
            --from-literal=jwt-secret="$JWT_SECRET_VALUE" \
            --from-literal=DB_HOST="$DB_HOST_VALUE" \
            --from-literal=DB_USERNAME="$DB_USERNAME_VALUE" \
            --from-literal=DB_PASSWORD="$ROOT_PW" \
            --namespace=job-portal \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -

      - name: Replace Image Tags with Commit SHA
        if: env.SKIP_K3S_DEPLOY != 'true'
        run: |
          sed -i "s|ravindudilhan/jobportal-backend:latest|ravindudilhan/jobportal-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|ravindudilhan/jobportal-frontend:latest|ravindudilhan/jobportal-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Deploy to EC2 K3s Cluster
        if: env.SKIP_K3S_DEPLOY != 'true'
        run: |
          export KUBECONFIG="${{ env.KUBECONFIG_FILE }}"

          # Apply namespace and configurations first
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/namespace.yaml
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/configmap.yaml -n job-portal
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/mysql-pvc.yaml -n job-portal
          
          # Deploy MySQL database
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/mysql-deployment.yaml -n job-portal
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/mysql-service.yaml -n job-portal
          
          # Deploy Application layers
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/backend-deployment.yaml -n job-portal
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/backend-service.yaml -n job-portal
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/frontend-deployment.yaml -n job-portal
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/frontend-service.yaml -n job-portal
          
          # Deploy Ingress routing rules
          kubectl --kubeconfig "$KUBECONFIG" apply -f k8s/ingress.yaml -n job-portal

      - name: Verify Deployments Rollout
        if: env.SKIP_K3S_DEPLOY != 'true'
        run: |
          export KUBECONFIG="${{ env.KUBECONFIG_FILE }}"

          echo "Verifying backend rollout..."
          kubectl --kubeconfig "$KUBECONFIG" rollout status deployment/backend -n job-portal --timeout=120s
          echo "Verifying frontend rollout..."
          kubectl --kubeconfig "$KUBECONFIG" rollout status deployment/frontend -n job-portal --timeout=120s

      - name: Skip K3s Deployment For Testing
        if: env.SKIP_K3S_DEPLOY == 'true'
        run: echo "K3s deployment skipped because KUBECONFIG is not configured."