
networks:
  jobportal-network:
    driver: bridge

services:
  db:
    image: mysql:8.0
    container_name: jobportal-db
    environment:
      MYSQL_ROOT_PASSWORD: Sql@123
      MYSQL_DATABASE: job_portal
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSql@123"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./jobportal-backend
      dockerfile: Dockerfile
    container_name: jobportal-backend
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/job_portal?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Sql@123
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=465
      - SPRING_MAIL_USERNAME=dilhanwgr2002@gmail.com
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      - MAIL_FROM=dilhanwgr2002@gmail.com
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST=smtp.gmail.com
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=false
      - JOB_FRONTEND_BASE_URL=http://localhost:3001
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jobportal-network
    restart: unless-stopped

  frontend:
    build:
      context: ./jobportal-frontend
      dockerfile: Dockerfile
      args:
        # Use relative /api/v1 path — nginx proxies it to backend:8080
        # This means the browser talks to http://localhost:3000/api/v1/...
        # and nginx forwards it to http://backend:8080/api/v1/...
        - REACT_APP_API_URL=http://localhost:3001/api/v1
    container_name: jobportal-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - jobportal-network
    restart: unless-stopped

volumes:
  db_data:
