# Database - from environment variables injected by K8s
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Mail - from environment variables
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM}

# Frontend
job.frontend.base.url=${JOB_FRONTEND_BASE_URL}

# Management
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

server.servlet.context-path=/api

# Security
jobportal.jwt.secret=${JWT_SECRET:local_dummy_jwt_secret_key_that_is_long_enough_to_be_secure}
jobportal.jwt.email-verification-secret=${EMAIL_VERIFICATION_SECRET:local_dummy_email_secret_key_that_is_long_enough_for_hmac_sha256_which_needs_at_least_256_bits}
jobportal.oauth2.applicant-client-secret=${APPLICANT_CLIENT_SECRET:local-applicant-secret}
jobportal.oauth2.company-client-secret=${COMPANY_CLIENT_SECRET:local-company-secret}
