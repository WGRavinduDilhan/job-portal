# H2 In-Memory Database for Instant Testing
spring.datasource.url=jdbc:h2:mem:jobportal_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Email (Placeholder - links will be printed to console logs)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dilhanwgr2002@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=dilhanwgr2002@gmail.com

# Frontend Config
job.frontend.base.url=http://localhost:3000

