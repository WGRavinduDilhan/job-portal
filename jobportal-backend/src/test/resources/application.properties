# Isolated Spring Boot Application Configuration for Testing
server.servlet.context-path=/api
spring.mvc.servlet.path=/v1
spring.application.name=jobportal-test

# Management & Probes config
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# H2 In-Memory Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Email Configuration placeholder
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dilhanwgr2002@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=dilhanwgr2002@gmail.com

# Frontend Config
job.frontend.base.url=http://localhost:3000

# Security Configuration placeholder
jobportal.jwt.secret=test_jwt_secret_key_that_is_long_enough
jobportal.jwt.email-verification-secret=test_email_secret_key_that_is_long_enough_for_hmac_sha256_which_needs_at_least_256_bits
jobportal.oauth2.applicant-client-secret=test-applicant
jobportal.oauth2.company-client-secret=test-company
