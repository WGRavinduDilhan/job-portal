apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: job-portal
  labels:
    app: jobportal
    service: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobportal
      service: frontend
  template:
    metadata:
      labels:
        app: jobportal
        service: frontend
    spec:
      containers:
        - name: frontend
          image: ravindudilhan/jobportal-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
