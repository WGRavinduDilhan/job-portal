apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: job-portal
  labels:
    app: jobportal
    service: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jobportal
      service: backend
  template:
    metadata:
      labels:
        app: jobportal
        service: backend
    spec:
      containers:
        - name: backend
          image: ravindudilhan/jobportal-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobportal-secrets
                  key: mysql-root-password
            - name: SPRING_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_MAIL_HOST
            - name: SPRING_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_MAIL_PORT
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobportal-secrets
                  key: mail-password
            - name: MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: MAIL_FROM
            - name: JOB_FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: jobportal-config
                  key: JOB_FRONTEND_BASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
