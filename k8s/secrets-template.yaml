apiVersion: v1
kind: Secret
metadata:
  name: jobportal-secrets
  labels:
    app: jobportal
type: Opaque
data:
  # INSTRUCTIONS:
  # Copy this file to 'secrets.yaml' and replace the values below with your real base64-encoded credentials.
  # DO NOT commit your 'secrets.yaml' file to source control.
  #
  # To generate a base64 string:
  #   - Linux/macOS: echo -n 'your_value_here' | base64
  #   - Windows (PowerShell): [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes('your_value_here'))
  
  # Default value is 
  mysql-root-password: U3FsQDEyMw==

  # Replace with base64 encoded SMTP password
  # DO NOT put your real password here - this file is committed to git!
  # Apply the real password directly via kubectl or GitHub Secrets.
  mail-password: cGxhY2Vob2xkZXI=

  # Default value is 'supersecretkey' (base64-encoded)
  jwt-secret: c3VwZXJzZWNyZXRrZXk=
  
  # Base64 encoded email verification secret
  # Plain text: jobportal_email_verify_prod_2024_secure
  email-verification-secret: am9icG9ydGFsX2VtYWlsX3ZlcmlmeV9wcm9kXzIwMjRfc2VjdXJl
  
  # Base64 encoded applicant client secret
  # Plain text: applicant-prod-secret-2024
  applicant-client-secret: YXBwbGljYW50LXByb2Qtc2VjcmV0LTIwMjQ=
  
  # Base64 encoded company client secret
  # Plain text: company-prod-secret-2024
  company-client-secret: Y29tcGFueS1wcm9kLXNlY3JldC0yMDI0
