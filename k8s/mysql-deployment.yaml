apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: jobportal
    service: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobportal
      service: db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jobportal
        service: db
    spec:
      containers:
        - name: db
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobportal-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "job_portal"
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
